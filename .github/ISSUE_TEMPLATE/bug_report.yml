name: Bug report
description: Report incorrect Kernel behavior.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include commands, fixture paths, and relevant `.agent/` files.
      value: |
        1.
        2.
        3.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Commands run and results.
  - type: input
    id: version
    attributes:
      label: Kernel Version Or Commit
      placeholder: 0.1.0 or commit SHA
