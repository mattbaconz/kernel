name: Documentation
description: Improve docs, examples, or release notes.
title: "[Docs]: "
labels:
  - documentation
body:
  - type: textarea
    id: page
    attributes:
      label: Page Or Area
      description: Which README, vault page, template, or generated doc needs work?
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What is unclear, missing, or wrong?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed Change
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: How should the doc change be checked?
